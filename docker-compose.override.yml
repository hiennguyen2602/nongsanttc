# Local dev — Docker tự gộp file này (gitignore)

services:
  web:
    ports:
      - "8080:80"

  db:
    ports:
      - "3307:3306"

  vite:
    image: node:22-alpine
    container_name: nongsanttc-vite
    working_dir: /var/www/html
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
      TZ: Asia/Ho_Chi_Minh
    volumes:
      - ./src:/var/www/html
      - ./docker/vite/start.sh:/docker/vite/start.sh:ro
      - vite_node_modules:/var/www/html/node_modules
    command: sh -c "sed 's/\\r$//' /docker/vite/start.sh | sh"
    ports:
      - "5173:5173"
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - nongsanttc
